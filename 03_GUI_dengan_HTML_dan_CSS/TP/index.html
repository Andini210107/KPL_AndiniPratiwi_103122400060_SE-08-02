<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<title>Pengkonversi Gaya Teks</title>

<link rel="stylesheet" href="index.css">

<link href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>Pengkonversi Gaya Teks</h1>

<p>
Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.
</p>

<label>Masukkan teks:</label>

<textarea id="editor" rows="8" placeholder="Kata-kata..."></textarea>

<p class="stat">
Huruf: <span id="total">0</span>,
huruf besar: <span id="upper">0</span>,
huruf kecil: <span id="lower">0</span>
</p>

<div class="tombol">
<button id="btnUpper">Besarkan</button>
<button id="btnLower">Kecilkan</button>
<button id="btnParagraph">Paragrafkan</button>
</div>

</div>

<script src="index.js"></script>

</body>
</html>
